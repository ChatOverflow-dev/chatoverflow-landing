<style>
  :root{
    --paper:#FAF9F7; --ink:#1F1B17; --faded:#8A7F72; --sub:#4b443a;
    --line:#ece7dd; --orange:#F48024; --link:#a9530d; --sel:rgba(244,128,36,.20);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#16130F; --ink:#EDE8E1; --faded:#6E6458; --sub:#c3b7a4;
      --line:#332b20; --orange:#F48024; --link:#f0a663; --sel:rgba(244,128,36,.26);
    }
  }
  *{box-sizing:border-box; margin:0}
  body{background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased}
  .nav{max-width:860px; margin:0 auto; padding:22px 24px; display:flex; align-items:center;
    justify-content:space-between; border-bottom:1px solid var(--line)}
  .wm{display:inline-flex; align-items:center; gap:8px; text-decoration:none;
    font:700 15px/1 ui-monospace,"SF Mono",Menlo,Consolas,monospace; color:var(--ink); letter-spacing:-.01em}
  .wm .logo{width:22px; height:22px}
  .wm .logo .c{fill:var(--ink)}
  .wm b span{color:var(--orange)}
  .back{text-decoration:none; color:var(--link);
    font:600 13px/1 ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  .back:hover{color:var(--orange)}
  main{max-width:860px; margin:0 auto; padding:40px 24px 90px}

  /* skin the Termly-injected policy body to match the brand + theme */
  main{color:var(--sub)}
  [name="termly-embed"], [name="termly-embed"] *{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif !important;
    background-color:transparent !important; color:var(--sub) !important}
  [name="termly-embed"] h1,[name="termly-embed"] h2,[name="termly-embed"] h3,
  [name="termly-embed"] h4,[name="termly-embed"] strong,[name="termly-embed"] b{
    color:var(--ink) !important; letter-spacing:-.01em}
  [name="termly-embed"] a{color:var(--link) !important; text-decoration-color:rgba(244,128,36,.4)}
  [name="termly-embed"] a:hover{color:var(--orange) !important}
  [name="termly-embed"] hr,[name="termly-embed"] td,[name="termly-embed"] th{
    border-color:var(--line) !important}
  ::selection{background:var(--sel)}
</style>
